<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section
      id="log-in"
      class="p-8 space-y-6 max-w-[520px] rounded-lg shadow-lg my-15 mx-auto hidden"
    >
      <div class="flex flex-col items-center">
        <img src="./assets/github-logo.png" alt="" class="w-[100px] mb-6" />
        <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <fieldset class="fieldset">
        <label class="font-medium text-base">Username</label>
        <input
          type="name"
          class="input w-[100%] rounded-lg"
          placeholder="Enter Username"
        />
        <p class="text-[#4A00FF] mb-2">Default: admin</p>

        <label class="font-medium text-base">Password</label>
        <input
          type="password"
          class="input w-[100%] rounded-lg"
          placeholder="Enter Password"
        />
        <p class="text-[#4A00FF]">Default: admin123</p>

        <button class="btn btn-primary mt-4 rounded-lg">Sign In</button>
      </fieldset>
      <div class="flex items-center gap-2">
        <hr class="border-gray-200 w-[100%]" />
        <span>OR</span>
        <hr class="border-gray-200 w-[100%]" />
      </div>
      <div class="text-center">
        <p class="text-[#64748B] text-sm">Demo Credentials:</p>
        <div class="bg-[#F8FAFC] w-full p-6">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </section>

    <section id="navbar">
      <div class="navbar bg-base-100 shadow-sm px-20 py-4 mb-15">
        <div class="flex-1">
          <a href="#" class="flex items-center gap-2"><img src="./assets/github-logo.png" alt="" class="w-9"><p class="text-2xl font-semibold">GitHub Issues Tracker</p></a>
        </div>
        <div class="flex items-center relative">
            <i class="fa-solid fa-magnifying-glass left-3 absolute z-10"></i>
          <input
            id="search"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-24 md:w-auto pl-10"
          />
        </div>
        <div class="btn btn-primary ml-3">+ New Issues</div>
      </div>
    </section>

    <section id="tab" class="flex items-center gap-2 p-6 w-[70%] mx-auto rounded-lg shadow-md mb-4">
        <div id="allTab" onclick="active('allTab')" class="btn w-[120px]">All</div>
        <div id="openTab" onclick="active('openTab')" class="btn w-[120px]">Open</div>
        <div id="closedTab" onclick="active('closedTab')" class="btn w-[120px]">Closed</div>
    </section>

    <section id="main" class="w-[70%] mx-auto">
        <div class="p-6 shadow-md rounded-t-lg flex justify-between">
            <div class="flex items-center gap-2">
                <div class="w-12.5 h-12.5 rounded-full bg-[#E5DAFF] flex justify-center items-center"><img src="./assets/Aperture.png" alt=""></div>
                <div>
                    <p class="text-xl font-semibold">50 Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                    <p class="font-medium">Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                    <p class="font-medium">Closed</p>
                </div>
            </div>
        </div>
        <div id="cards-container" class="bg-[#FBFBFB] shadow-md p-6 gap-2">
        </div>
    </section>
    
    <section id ="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-ring loading-xl"></span>
    </section>

<dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box max-w-3xl p-8">
    <div id="details-container" class="space-y-6">
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="./main.js"></script>
  </body>
</html>
